<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ваш кошик — Fish House Anna</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="header__container">
            
            <a href="index.html" class="header__logo">Fish House Anna</a>

            <div class="header__search">
                <input type="text" class="header__search-input" placeholder="Шукати свіжу рибку...">
                <button type="submit" class="header__search-btn">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>

            <nav class="header__menu">
                <a href="index.html" class="header__menu-link" id="nav-home">Головна</a>
                <a href="products.html" class="header__menu-link" id="nav-products">Продукція</a>
                <a href="index.html#delivery" class="header__menu-link">Доставка</a>
                <a href="#footer-contacts" class="header__menu-link">Контакти</a>
            </nav>

            <a href="favorites.html" class="header__favorites" title="Обране" style="margin-right: 20px; color: inherit; font-size: 1.2rem; position: relative;">
                <i class="fa-regular fa-heart"></i>
                <span class="header__favorites-count" style="position: absolute; top: -8px; right: -10px; background: #ff7a00; color: #fff; font-size: 0.7rem; padding: 2px 6px; border-radius: 50%;">0</span>
            </a>

            <a href="korzina.html" class="header__cart" title="Кошик" style="margin-right: 25px; color: inherit; font-size: 1.2rem; position: relative;">
                <i class="fa-solid fa-basket-shopping"></i>
                <span class="header__cart-count" style="position: absolute; top: -8px; right: -10px; background: #ff7a00; color: #fff; font-size: 0.7rem; padding: 2px 6px; border-radius: 50%;">0</span>
            </a>

            <a href="#" class="header__account" title="Увійти в акаунт" style="color: inherit; font-size: 1.1rem; display: inline-flex; align-items: center; gap: 6px; margin-right: 15px; transition: color 0.3s;">
                <i class="fa-regular fa-user"></i>
                <span class="header__account-text" style="font-size: 0.95rem; font-weight: 500;">Вхід</span>
            </a>

            <button class="header__burger" aria-label="Управління меню">
                <span class="header__burger-line"></span>
                <span class="header__burger-line"></span>
                <span class="header__burger-line"></span>
            </button>

        </div>
    </header>

    <main class="main">
        <div class="container">
            <section class="cart-section">
                <h1 class="cart-section__title"><i class="fa-solid fa-basket-shopping"></i> Оформлення замовлення</h1>
                
                <div class="cart-layout" id="cart-layout">
                    <div class="cart-layout__products">
                        <div class="cart-table" id="cart-table-container">
                            </div>
                    </div>

                    <aside class="cart-layout__sidebar">
                        <div class="checkout-block">
                            <h3 class="checkout-block__title">Підсумок замовлення</h3>
                            
                            <div class="checkout-summary">
                                <div class="checkout-summary__row">
                                    <span>Товари:</span>
                                    <span id="summary-items-count">0 шт.</span>
                                </div>
                                <div class="checkout-summary__row checkout-summary__row--total">
                                    <span>До сплати:</span>
                                    <span id="summary-total-price">0 грн</span>
                                </div>
                            </div>

                            <form class="checkout-form" id="checkout-order-form">
    <!-- Выбор способа доставки (Перенесли на самый верх для логики формы) -->
    <div class="checkout-form__group">
        <label class="checkout-form__label">Спосіб доставки *</label>
        <select class="checkout-form__select" id="delivery-method" required>
            <option value="pickup">Самовивіз (пр. Соборний, 177)</option>
            <option value="courier">Доставка кур'єром по місту (від 700 грн)</option>
            <option value="ukraine">Відправка по Україні Новою Поштою (від 300 грн)</option>
        </select>
    </div>

    <!-- БЛОК 1: Поля для Самовивозу -->
    <div id="form-block-pickup" class="delivery-fields-block">
        <div class="checkout-form__group">
            <label class="checkout-form__label">Прізвище *</label>
            <input type="text" class="checkout-form__input" data-field="lastname" placeholder="Іванов">
        </div>
        <div class="checkout-form__group">
            <label class="checkout-form__label">Ім'я *</label>
            <input type="text" class="checkout-form__input" data-field="firstname" placeholder="Іван">
        </div>
        <div class="checkout-form__group">
            <label class="checkout-form__label">По батькові</label>
            <input type="text" class="checkout-form__input" data-field="middlename" placeholder="Іванович (необов'язково)">
        </div>
        <div class="checkout-form__group">
            <label class="checkout-form__label">Телефон *</label>
            <input type="tel" class="checkout-form__input" data-field="phone" placeholder="+38 (067) 000-00-00">
        </div>
        <div class="checkout-form__group">
            <label class="checkout-form__label">Дата візиту *</label>
            <input type="date" class="checkout-form__input" data-field="date">
        </div>
    </div>

    <!-- БЛОК 2: Поля для Доставки по городу (скрыт по умолчанию) -->
    <div id="form-block-courier" class="delivery-fields-block" style="display: none;">
        <div class="checkout-form__group">
            <label class="checkout-form__label">Прізвище *</label>
            <input type="text" class="checkout-form__input" data-field="lastname" placeholder="Іванов">
        </div>
        <div class="checkout-form__group">
            <label class="checkout-form__label">Ім'я *</label>
            <input type="text" class="checkout-form__input" data-field="firstname" placeholder="Іван">
        </div>
        <div class="checkout-form__group">
            <label class="checkout-form__label">По батькові</label>
            <input type="text" class="checkout-form__input" data-field="middlename" placeholder="Іванович (необов'язково)">
        </div>
        <div class="checkout-form__group">
            <label class="checkout-form__label">Телефон *</label>
            <input type="tel" class="checkout-form__input" data-field="phone" placeholder="+38 (067) 000-00-00">
        </div>
        <div class="checkout-form__group">
            <label class="checkout-form__label">Адреса доставки *</label>
            <input type="text" class="checkout-form__input" data-field="address" placeholder="вулиця, будинок, квартира">
        </div>
        <div class="checkout-form__group">
            <label class="checkout-form__label">Під'їзд</label>
            <input type="text" class="checkout-form__input" data-field="entrance" placeholder="Номер під'їзду (необов'язково)">
        </div>
    </div>

    <!-- БЛОК 3: Поля для Отправки по Украине (скрыт по умолчанию) -->
    <div id="form-block-ukraine" class="delivery-fields-block" style="display: none;">
        <div class="checkout-form__group">
            <label class="checkout-form__label">Повне ПІБ отримувача *</label>
            <input type="text" class="checkout-form__input" data-field="fullname" placeholder="Іванов Іван Іванович">
        </div>
        <div class="checkout-form__group">
            <label class="checkout-form__label">Телефон *</label>
            <input type="tel" class="checkout-form__input" data-field="phone" placeholder="+38 (067) 000-00-00">
        </div>
        <!-- Галочка для адресной доставки Новой Почты -->
        <div class="checkout-form__group" style="display: flex; align-items: center; gap: 10px; margin: 15px 0;">
            <input type="checkbox" id="address-delivery-checkbox" style="width: 18px; height: 18px; accent-color: #ff7a00; cursor: pointer;">
            <label for="address-delivery-checkbox" style="font-size: 0.95rem; color: #cbd5e1; cursor: pointer; user-select: none;">Адресна доставка додому</label>
        </div>
        <div class="checkout-form__group">
            <label class="checkout-form__label" id="ukraine-delivery-label">Номер або адреса відділення Нової Пошти *</label>
            <input type="text" id="ukraine-delivery-input" class="checkout-form__input" data-field="shipping-address" placeholder="Відділення №1, вул. Головна 5">
        </div>
    </div>

    <!-- Общий комментарий -->
    <div class="checkout-form__group">
        <label class="checkout-form__label">Коментар до замовлення</label>
        <textarea class="checkout-form__textarea" placeholder="Уточнення щодо часу або ваги..."></textarea>
    </div>

    <!-- Визуальный инфоблок минимальной суммы (для вывода предупреждений) -->
    <div id="min-sum-info" class="checkout-form__min-info" style="display: none;"></div>

    <button type="submit" class="checkout-form__submit-btn" id="submit-order-btn">
        <i class="fa-solid fa-check"></i> Підтвердити замовлення
    </button>
</form>
                        </div>
                    </aside>
                </div>

                <div class="cart-empty" id="cart-empty-message" style="display: none;">
                    <i class="fa-solid fa-basket-shopping cart-empty__icon"></i>
                    <h2>Ваш кошик порожній</h2>
                    <p>Перейдіть до каталогу, щоб вибрати найсвіжішу рибку та морепродукти.</p>
                    <a href="products.html" class="cart-empty__btn">Перейти до каталогу</a>
                </div>

            </section>
        </div>
    </main>

    <footer class="footer" id="footer-contacts">
        <div class="footer__container">
            <div class="footer__bottom">
                <p>© 2026 Fish House Anna. Всі права захищені.</p>
            </div>
        </div>
    </footer>

    <script src="main.js"></script>
    <script src="cart.js"></script>
    <div id="cart-product-popup" class="popup">
        <div class="popup__overlay"></div>
        <div class="popup__content">
            <button class="popup__close" id="cart-popup-close-btn">&times;</button>
            <div class="popup-grid">
                <div class="popup-grid__img-box">
                    <img id="cart-popup-img" src="" alt="Товар" class="popup-grid__img">
                </div>
                <div class="popup-grid__info">
                    <h2 id="cart-popup-title" class="popup-grid__title"></h2>
                    <p id="cart-popup-desc" class="popup-grid__desc"></p>
                    <div class="popup__price-block">
                        <span class="popup__price-label">Ціна:</span>
                        <span id="cart-popup-price" class="popup__price-num"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
