<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fish House Anna — Рибний дім</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="header__container">
            
            <a href="index.html" class="header__logo">
                Fish House Anna
            </a>

            <div class="header__search">
                <input type="text" class="header__search-input" placeholder="Шукати свіжу рибку...">
                <button type="submit" class="header__search-btn">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>

            <nav class="header__menu">
                <a href="index.html" class="header__menu-link header__menu-link--active">Головна</a>
                <a href="products.html" class="header__menu-link">Продукція</a>
                <a href="#" class="header__menu-link">Доставка</a>
                <a href="#" class="header__menu-link">Контакти</a>
            </nav>

            <a href="#" class="header__cart" title="Кошик">
                <i class="fa-solid fa-basket-shopping"></i>
                <span class="header__cart-count">0</span>
            </a>

            <button class="header__burger" aria-label="Управління меню">
                <span class="header__burger-line"></span>
                <span class="header__burger-line"></span>
                <span class="header__burger-line"></span>
            </button>

        </div>
    </header>

    <script src="main.js"></script>
</body>
</html>
