<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обрані товари — Fish House Anna</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="header__container">
            
            <a href="index.html" class="header__logo">Fish House Anna</a>

            <div class="header__search">
                <input type="text" class="header__search-input" placeholder="Шукати свіжу рибку...">
                <button type="submit" class="header__search-btn">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>

            <nav class="header__menu">
                <a href="index.html" class="header__menu-link" id="nav-home">Головна</a>
                <a href="products.html" class="header__menu-link" id="nav-products">Продукція</a>
                <a href="index.html#delivery" class="header__menu-link">Доставка</a>
                <a href="#footer-contacts" class="header__menu-link">Контакти</a>
            </nav>

            <a href="favorites.html" class="header__favorites" title="Обране" style="margin-right: 20px; color: inherit; font-size: 1.2rem; position: relative;">
                <i class="fa-regular fa-heart"></i>
                <span class="header__favorites-count" style="position: absolute; top: -8px; right: -10px; background: #ff7a00; color: #fff; font-size: 0.7rem; padding: 2px 6px; border-radius: 50%;">0</span>
            </a>

            <a href="korzina.html" class="header__cart" title="Кошик" style="margin-right: 25px; color: inherit; font-size: 1.2rem; position: relative;">
                <i class="fa-solid fa-basket-shopping"></i>
                <span class="header__cart-count" style="position: absolute; top: -8px; right: -10px; background: #ff7a00; color: #fff; font-size: 0.7rem; padding: 2px 6px; border-radius: 50%;">0</span>
            </a>

            <a href="#" class="header__account" title="Увійти в акаунт" style="color: inherit; font-size: 1.1rem; display: inline-flex; align-items: center; gap: 6px; margin-right: 15px; transition: color 0.3s;">
                <i class="fa-regular fa-user"></i>
                <span class="header__account-text" style="font-size: 0.95rem; font-weight: 500;">Вхід</span>
            </a>

            <button class="header__burger" aria-label="Управління меню">
                <span class="header__burger-line"></span>
                <span class="header__burger-line"></span>
                <span class="header__burger-line"></span>
            </button>

        </div>
    </header>

    <main class="main">
        <div class="container" style="max-width: 1400px; margin: 0 auto; padding: 0 20px;">
            <section class="favorites-section" style="padding: 30px 0 60px 0;">
                <h1 style="font-size: 2rem; margin-bottom: 30px; color: #fff; text-shadow: 0 0 15px rgba(255, 122, 0, 0.2);">
                    <i class="fa-solid fa-heart" style="color: #ff7a00;"></i> Ваше обране
                </h1>
                
                <div class="catalog__grid" id="favorites-grid"></div>

                <div class="cart-empty" id="favorites-empty-message" style="display: none;">
                    <i class="fa-regular fa-heart cart-empty__icon"></i>
                    <h2>Список обраного порожній</h2>
                    <p>Додавайте товари, які вам сподобалися, щоб не загубити їх.</p>
                    <a href="products.html" class="cart-empty__btn">Перейти до каталогу</a>
                </div>
            </section>
        </div>
    </main>

    <footer class="footer" id="footer-contacts">
        <div class="footer__container">
            <div class="footer__bottom">
                <p>© 2026 Fish House Anna. Всі права захищені.</p>
            </div>
        </div>
    </footer>

    <script src="main.js"></script>
    <script src="favorites.js"></script>
</body>
</html>
